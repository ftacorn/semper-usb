name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ClamAV
        run: |
          # ubuntu-latest runners ship with ClamAV pre-installed and freshclam running.
          # Kill it and delete the log file BEFORE apt-get, otherwise the freshclam
          # post-install script fails to lock the log and apt exits with code 1.
          sudo systemctl stop clamav-freshclam 2>/dev/null || true
          sudo pkill -9 freshclam 2>/dev/null || true
          sudo rm -f /var/log/clamav/freshclam.log
          sleep 1
          sudo apt-get update -q
          sudo apt-get install -y clamav clamav-daemon
          # Stop freshclam again — apt-get may have restarted it during post-install
          sudo systemctl stop clamav-freshclam 2>/dev/null || true
          sudo pkill freshclam 2>/dev/null || true
          sleep 2
          # systemd-tmpfiles does not run on Actions runners, so clamd has no socket
          # directory to write into and exits silently. Create it explicitly.
          sudo mkdir -p /var/run/clamav
          sudo chown clamav:clamav /var/run/clamav
          sudo chmod 755 /var/run/clamav
          sudo service clamav-daemon start
          # Wait until the ClamAV daemon socket is actually ready (up to 60s)
          for i in $(seq 1 60); do
            if clamdscan --ping 2>/dev/null; then
              echo "ClamAV daemon is ready (attempt $i)"
              break
            fi
            echo "Waiting for ClamAV daemon... ($i/60)"
            sleep 1
          done
          # Ensure the socket is world-accessible so the runner user (and Python) can reach it
          sudo chmod 666 /var/run/clamav/clamd.ctl

      - name: Verify ClamAV detects EICAR
        run: |
          echo 'X5O!P%@AP[4\PZX54(P^)7CC)7}$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!$H+H*' > /tmp/eicar_test.txt
          clamdscan --stdout /tmp/eicar_test.txt || true
          clamdscan --stdout /tmp/eicar_test.txt | grep -q "FOUND" && echo "EICAR detection OK" || echo "WARNING: EICAR not detected — integration test may fail"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v -m "not integration"

      - name: Run integration tests
        run: pytest tests/test_integration.py -v -m integration

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (no ClamAV on Windows runner)
        run: pytest tests/ -v -m "not integration" --ignore=tests/test_write_blocker.py
