name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ClamAV
        run: |
          # ubuntu-latest runners ship with ClamAV pre-installed and freshclam running.
          # Kill it and delete the log file BEFORE apt-get, otherwise the freshclam
          # post-install script fails to lock the log and apt exits with code 1.
          sudo systemctl stop clamav-freshclam 2>/dev/null || true
          sudo pkill -9 freshclam 2>/dev/null || true
          sudo rm -f /var/log/clamav/freshclam.log
          sleep 1
          sudo apt-get update -q
          sudo apt-get install -y clamav clamav-daemon
          # Stop freshclam again — apt-get may have restarted it during post-install
          sudo systemctl stop clamav-freshclam 2>/dev/null || true
          sudo pkill freshclam 2>/dev/null || true
          sleep 2
          # Remove the 'Example' placeholder line — on some Ubuntu images this line
          # is left in clamd.conf and silently prevents the daemon from starting.
          sudo sed -i '/^Example$/d' /etc/clamav/clamd.conf
          # Show key config values for diagnostics
          echo "=== clamd.conf (key lines) ==="
          grep -E "^(LocalSocket|DatabaseDirectory|User)" /etc/clamav/clamd.conf || true
          # Confirm the database directory has actual .cvd/.cld files
          DB_DIR=$(grep -E "^DatabaseDirectory" /etc/clamav/clamd.conf | awk '{print $2}')
          echo "=== Database dir: $DB_DIR ==="
          ls -lh "$DB_DIR" 2>/dev/null || echo "(empty or missing)"
          # Create socket directory (systemd-tmpfiles doesn't run on Actions runners)
          sudo mkdir -p /var/run/clamav
          sudo chown clamav:clamav /var/run/clamav
          sudo chmod 755 /var/run/clamav
          sudo service clamav-daemon start || true
          # Show daemon status immediately after start attempt
          sleep 2
          sudo systemctl status clamav-daemon --no-pager -l || true
          sudo tail -20 /var/log/clamav/clamd.log 2>/dev/null || true
          # Wait until the ClamAV daemon socket is actually ready (up to 60s)
          for i in $(seq 1 60); do
            if clamdscan --ping 2>/dev/null; then
              echo "ClamAV daemon is ready (attempt $i)"
              break
            fi
            echo "Waiting for ClamAV daemon... ($i/60)"
            sleep 1
          done
          # Open up the socket so the runner user (and Python) can reach it.
          # Use a literal space in grep (not \s — invalid in POSIX ERE).
          SOCKET=$(grep "^LocalSocket " /etc/clamav/clamd.conf | awk '{print $2}')
          echo "=== Socket path from config: '$SOCKET' ==="
          ls -la "$SOCKET" 2>/dev/null || echo "Socket file not found at '$SOCKET'"
          ls -la "$(dirname "$SOCKET")/" 2>/dev/null || true
          sudo chmod 755 "$(dirname "$SOCKET")"
          sudo chmod 666 "$SOCKET"
          echo "=== Permissions after chmod ==="
          ls -la "$SOCKET"

      - name: Verify ClamAV detects EICAR
        run: |
          echo 'X5O!P%@AP[4\PZX54(P^)7CC)7}$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!$H+H*' > /tmp/eicar_test.txt
          clamdscan --stdout /tmp/eicar_test.txt || true
          clamdscan --stdout /tmp/eicar_test.txt | grep -q "FOUND" && echo "EICAR detection OK" || echo "WARNING: EICAR not detected — integration test may fail"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify ClamAV Python connectivity
        run: |
          python3 - <<'EOF'
          import os, clamd
          socket = "/var/run/clamav/clamd.ctl"
          print(f"os.path.exists('{socket}'): {os.path.exists(socket)}")
          import subprocess
          print(subprocess.check_output(["ls", "-la", "/var/run/clamav/"]).decode())
          cd = clamd.ClamdUnixSocket(socket)
          cd.ping()
          print("clamd ping via Python: OK")
          EOF

      - name: Run unit tests
        run: pytest tests/ -v -m "not integration"

      - name: Run integration tests
        run: pytest tests/test_integration.py -v -m integration

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (no ClamAV on Windows runner)
        run: pytest tests/ -v -m "not integration" --ignore=tests/test_write_blocker.py
