name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ClamAV
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clamav clamav-daemon
          # Kill freshclam entirely — service stop isn't fast enough to release the log lock
          sudo systemctl stop clamav-freshclam || true
          sudo pkill freshclam || true
          sleep 2
          # Skip freshclam update: the package ships with a database that detects EICAR
          sudo service clamav-daemon start
          # Wait until the ClamAV daemon socket is actually ready (up to 30s)
          for i in $(seq 1 30); do
            if clamdscan --ping 2>/dev/null; then
              echo "ClamAV daemon is ready (attempt $i)"
              break
            fi
            echo "Waiting for ClamAV daemon... ($i/30)"
            sleep 1
          done

      - name: Verify ClamAV detects EICAR
        run: |
          echo 'X5O!P%@AP[4\PZX54(P^)7CC)7}$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!$H+H*' > /tmp/eicar_test.txt
          clamdscan --stdout /tmp/eicar_test.txt || true
          clamdscan --stdout /tmp/eicar_test.txt | grep -q "FOUND" && echo "EICAR detection OK" || echo "WARNING: EICAR not detected — integration test may fail"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v -m "not integration"

      - name: Run integration tests
        run: pytest tests/test_integration.py -v -m integration

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (no ClamAV on Windows runner)
        run: pytest tests/ -v -m "not integration" --ignore=tests/test_write_blocker.py
